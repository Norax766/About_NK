<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile :3</title>
<link rel="icon" href="images/icon.jpg" type="image/png">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  display: flex;
  color: #fff;
  overflow-x: hidden;

  background: radial-gradient(circle at 20% 30%, #5865f2 0%, transparent 40%),
              radial-gradient(circle at 80% 70%, #1db954 0%, transparent 40%),
              #0f1115;

  background-size: 200% 200%;
  animation: bgMove 15s infinite alternate ease-in-out;
}

@keyframes bgMove {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 100% 50%;
  }
}


body::after {
  content: "";
  position: fixed;
  inset: 0;

  background-image: radial-gradient(white 1px, transparent 1px);
  background-size: 40px 40px;

  opacity: 0.05;
  z-index: -1;

  animation: particlesMove 60s linear infinite;
}

@keyframes particlesMove {
  from { transform: translateY(0); }
  to { transform: translateY(-200px); }
}


body::before {
  content: "";
  position: fixed;
  inset: 0;

  backdrop-filter: blur(60px);
  background: rgba(0,0,0,0.4);

  z-index: -1;
}

.sidebar {
  width: 80px;
  background: #1e1f22;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: space-between; /* 👈 clave */
  align-items: center;

  padding: 20px 0;
}

.sidebar {
  width: 80px;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;

  padding: 20px 0;

  /* 🌫️ ULTRA GLASS */
  background: rgba(255, 255, 255, 0.12);

  backdrop-filter: blur(35px) saturate(200%) brightness(1.2);
  -webkit-backdrop-filter: blur(35px) saturate(200%) brightness(1.2);

  border-right: 1px solid rgba(255,255,255,0.25);

  box-shadow:
    inset 0 2px 4px rgba(255,255,255,0.3),
    inset 0 -2px 4px rgba(255,255,255,0.1),
    0 0 40px rgba(88,101,242,0.3),
    0 0 80px rgba(88,101,242,0.2);

  position: relative;
  overflow: hidden;
}

.sidebar::after {
  content: "";
  position: absolute;
  inset: -20px;

  background: radial-gradient(circle at 50% 50%, #5865f2, transparent 70%);
  opacity: 0.2;
  filter: blur(40px);

  z-index: -1;
}

.sidebar img {
  width: 50px;
  border-radius: 50%;
  cursor: pointer;

  transition: 0.3s;

  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.sidebar img:hover {
  transform: scale(1.15);

  box-shadow:
    0 0 15px rgba(88,101,242,0.8),
    0 0 30px rgba(88,101,242,0.4);
}


/* Main */
.main {
  flex: 1;
  padding: 20px;
}

/* Contenedor */
.container {
  background: #2b2d31;
  border-radius: 10px;
  overflow: hidden;
}

/* Banner */
.banner {
  position: relative;
  height: 180px;
  overflow: hidden;
}

.banner-base {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.banner-effect {
  position: absolute;
  inset: 0;
  object-fit: cover;
  opacity: 0.5;
  mix-blend-mode: screen;
  animation: bannerMove 6s infinite alternate;
}

@keyframes bannerMove {
  0% { transform: scale(1); }
  100% { transform: scale(1.1); }
}

/* Perfil */
.profile {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px;
}

/* Avatar */
.avatar {
  position: relative;
  width: 80px;
  height: 80px;
  animation: pulse 3s infinite ease-in-out;
}

.avatar-img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}

.avatar-decoration {
  position: absolute;
  top: -5px;
  left: -5px;
  width: 90px;
  height: 90px;
  animation: glow 2.5s infinite alternate;
}

.status {
  position: absolute;
  bottom: 2px;
  right: 2px;
  width: 18px;
  height: 18px;
  background: #23a55a;
  border: 3px solid #2b2d31;
  border-radius: 50%;
}

@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

@keyframes glow {
  0% { filter: drop-shadow(0 0 2px #5865f2); }
  100% { filter: drop-shadow(0 0 10px #5865f2); }
}

.profile h1 {
  font-size: 22px;
}

/* Sobre mí */
.about {
  padding: 15px;
}

.about h2 {
  color: #5865f2;
  margin-bottom: 10px;
}

.card {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);

  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.15);

  box-shadow:
    0 8px 32px rgba(0,0,0,0.4),
    inset 0 1px 1px rgba(255,255,255,0.2);

  padding: 15px;

  transition: 0.3s ease;
}

.card:hover {
  background: rgba(255, 255, 255, 0.12);

  box-shadow:
    0 12px 40px rgba(0,0,0,0.5),
    inset 0 1px 2px rgba(255,255,255,0.25);
}

.about h2 {
  color: #fff;
  text-shadow: 0 0 10px rgba(88,101,242,0.6);
}

.card p {
  white-space: pre-line;
}

/* Overlay */
#overlay {
  position: fixed;
  inset: 0;
  background: #1e1f22;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  cursor: pointer;
  transition: 0.5s;
}

#overlay h1 {
  opacity: 0.8;
}

#overlay:hover h1 {
  opacity: 1;
}

/* Responsive */
@media (max-width: 768px){
  body { flex-direction: column; }
  .sidebar { width:100%; height:60px; flex-direction:row; }
  .banner { height:120px; }
  .profile { flex-direction:column; text-align:center; }
}

/* 🎧 Player mejorado */
.player-ui {
  position: relative;
  overflow: hidden;
  width: 320px;
  border-radius: 15px;
}

/* VIDEO DE FONDO */
.bg-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;

  object-fit: cover;
  z-index: 0;

  opacity: 0.35;
  filter: blur(2px) brightness(0.7);
}

/* contenido encima del video */
.player-ui > *:not(.bg-video) {
  position: relative;
  z-index: 2;
}


.bg-video {
  transform: scale(1.1);
  animation: slowZoom 20s infinite alternate ease-in-out;
}

@keyframes slowZoom {
  from { transform: scale(1.05); }
  to { transform: scale(1.15); }
}


/* 🌈 Blur dinámico */
.player-ui::before {
  content: "";
  position: absolute;
  inset: -20px;
  background: url("images/cover.jpg") center/cover;
  filter: blur(30px) brightness(0.5);
  z-index: 0;
}

.player-ui > * {
  position: relative;
  z-index: 1;
}

/* 🎵 Barra tipo Spotify */
.progress-container {
  width: 100%;
  height: 6px;
  background: #2a2a2a;
  border-radius: 10px;
  margin: 12px 0;
  cursor: pointer;
  position: relative;
}

/* progreso */
.progress {
  height: 100%;
  width: 0%;
  background: #1db954; /* verde Spotify */
  border-radius: 10px;
  transition: width 0.1s linear;
}

/* círculo draggable */
.progress::after {
  content: "";
  position: absolute;
  right: -5px;
  top: -4px;
  width: 14px;
  height: 14px;
  background: #1db954;
  border-radius: 50%;
  opacity: 0;
  transition: 0.2s;
}

.progress-container:hover .progress::after {
  opacity: 1;
}

/* tiempo */
.time {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #ddd;
}

.lyrics {
  margin-top: 15px;
  height: 120px;
  overflow: hidden;
  position: relative;
  font-size: 14px;
  color: #aaa;
}

.lyrics-line {
  text-align: center;
  opacity: 0.4;
  transition: 0.3s;
}

.lyrics-line.active {
  font-size: 16px;
  color: #fff;
  opacity: 1;
  font-weight: bold;
}

#music-panel {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(10px);

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
}

#music-panel.active {
  opacity: 1;
  pointer-events: all;
}

#music-panel.active {
  opacity: 1;
  pointer-events: all;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 15px;
  margin-top: 10px;
}

.controls button {
  background: #5865f2;
  border: none;
  color: white;
  font-size: 18px;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
}

.volume-control {
  display: flex;
  align-items: center;
  gap: 5px;
}

#volume {
  width: 80px;
}

</style>
</head>

<body>

<!-- Pantalla de entrada -->
<div id="overlay">
  <h1>Click para entrar</h1>
</div>

<div class="sidebar">

  <!-- HOME arriba -->
  <div>
    <img src="images/Home.jpg">
  </div>

  <!-- MÚSICA abajo -->
  <div onclick="openPlayer()" style="font-size:28px; cursor:pointer;">
    🎵
  </div>
</div>

<div class="main">

  <div class="container">

    <!-- Banner -->
    <div class="banner">
      <img src="images/banner_picture.png" class="banner-base">

      <div class="avatar">
        <img src="images/profilepicture.jpg" class="avatar-img">
        <img src="images/hologram_dragon.webp" class="avatar-decoration">
        <span class="status"></span>
      </div>
      <h1>Karu 💙</h1>
    </div>

    <!-- Sobre mí -->
    <div class="about">
      <h2>Sobre mí</h2>
      <div class="card">
<p>Hola!!! Que tal? Espero que muy bien :3

Bueno me presento...
Me llamo Axel pero dime como mi username :)

Tengo 17 años...

Mis pasatiempos:

- Discord</p>

  </div>
</div>

<!-- 🎵 PANEL DE MÚSICA -->
<div id="music-panel">
  <div class="player-ui">
    
    <video class="bg-video" autoplay muted loop>
  <source src="videos/DEtrackbd.mp4" type="video/mp4">
    </video>

    <img src="images/cover.jpg" class="cover">

    <h3 id="song-title">Desconexión Emocional</h3>
    <p id="artist">Missa Sinfonia</p>

    <!-- Barra -->
    <div class="progress-container" onclick="seek(event)">
      <div class="progress" id="progress"></div>
    </div>

      <span id="current">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <div class="controls">
  <button id="play-btn" onclick="toggleMusic()">▶️</button>

    🔊
    <input type="range" id="volume" min="0" max="1" step="0.01">

<div id="lyrics-box" class="lyrics"></div>

</div>

<!-- Audio -->
<audio id="music" loop>
  <source src="audio/Desconexion Emocional/Desconexión Emocional.mp3">
</audio>

<script>

</script>
<script>
const music = document.getElementById("music");
const overlay = document.getElementById("overlay");
const panel = document.getElementById("music-panel");

const progress = document.getElementById("progress");
const progressContainer = document.querySelector(".progress-container");
const current = document.getElementById("current");
const duration = document.getElementById("duration");

let isDragging = false;

// 🎬 START
overlay.onclick = () => {
  overlay.style.opacity = "0";
  setTimeout(()=> overlay.style.display="none",500);

  music.volume = 0.5;
  music.play();
};

// 🎵 abrir panel
function openPlayer(){
  panel.classList.add("active");
}

// cerrar
panel.onclick = (e)=>{
  if(e.target.id === "music-panel"){
    panel.classList.remove("active");
  }
};

// play/pause
function toggleMusic(){
  music.paused ? music.play() : music.pause();
}

// ⏱ CUANDO YA CARGA LA CANCIÓN
music.addEventListener("loadedmetadata", () => {
  duration.textContent = formatTime(music.duration);
});

// 🔄 ACTUALIZAR PROGRESO
music.addEventListener("timeupdate", () => {
  if (!music.duration || isDragging) return;

  const percent = (music.currentTime / music.duration) * 100;
  progress.style.width = percent + "%";

  current.textContent = formatTime(music.currentTime);
});

// 🖱 DRAG REAL
progressContainer.addEventListener("mousedown", () => {
  isDragging = true;
});

document.addEventListener("mouseup", () => {
  isDragging = false;
});

document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const rect = progressContainer.getBoundingClientRect();
  let x = e.clientX - rect.left;

  x = Math.max(0, Math.min(x, rect.width));

  const percent = x / rect.width;
  progress.style.width = (percent * 100) + "%";

  music.currentTime = percent * music.duration;
});

// 📱 soporte táctil
progressContainer.addEventListener("touchstart", () => isDragging = true);

document.addEventListener("touchend", () => isDragging = false);

document.addEventListener("touchmove", (e) => {
  if (!isDragging) return;

  const rect = progressContainer.getBoundingClientRect();
  let x = e.touches[0].clientX - rect.left;

  x = Math.max(0, Math.min(x, rect.width));

  const percent = x / rect.width;
  progress.style.width = (percent * 100) + "%";

  music.currentTime = percent * music.duration;
});

// 🧠 formato tiempo
function formatTime(t){
  if (isNaN(t)) return "0:00";

  const m = Math.floor(t/60);
  const s = Math.floor(t%60);
  return m + ":" + (s < 10 ? "0" : "") + s;
}

let lyrics = [];

// cargar .lrc
async function loadLyrics(){
  const res = await fetch("audio/Desconexion Emocional/Desconexión Emocional.lrc");
  const text = await res.text();

  const lines = text.split("\n");

  lyrics = lines.map(line=>{
    const match = line.match(/\[(\d+):(\d+)(?:\.(\d+))?\]/);
    if(!match) return null;

    return {
      time: parseInt(match[1])*60 + parseInt(match[2]) + (match[3]? parseInt(match[3])/100:0),
      text: line
  .replace(/\[.*?\]/g, "")   // quita [00:00]
  .replace(/<.*?>/g, "")     // quita <00:00.00>
  .trim()

    };
  }).filter(l => l && l.text && !l.text.includes("www"));

  renderLyrics();
}

// pintar líneas
function renderLyrics(){
  const box = document.getElementById("lyrics-box");
  box.innerHTML = "";

  lyrics.forEach((l,i)=>{
    const div = document.createElement("div");
    div.classList.add("lyrics-line");
    div.textContent = l.text;
    div.id = "line-" + i;
    box.appendChild(div);
  });
}

// sincronizar
function updateLyrics(){
  const t = music.currentTime;

  for(let i=0;i<lyrics.length;i++){
    if(t >= lyrics[i].time){
      // quitar active
      document.querySelectorAll(".lyrics-line").forEach(el=>el.classList.remove("active"));

      const active = document.getElementById("line-"+i);
      if(active){
        active.classList.add("active");

        // auto scroll centrado
        active.scrollIntoView({
          behavior: "smooth",
          block: "center"
        });
      }
    }
  }
}

// conectar con el tiempo
music.addEventListener("timeupdate", updateLyrics);

loadLyrics();

const playBtn = document.getElementById("play-btn");
const volumeSlider = document.getElementById("volume");

// cargar volumen guardado
const savedVolume = localStorage.getItem("volume");
if(savedVolume !== null){
  music.volume = savedVolume;
  volumeSlider.value = savedVolume;
} else {
  music.volume = 0.5;
  volumeSlider.value = 0.5;
}

// cambiar volumen
volumeSlider.addEventListener("input", ()=>{
  music.volume = volumeSlider.value;
  localStorage.setItem("volume", volumeSlider.value);
});

// toggle play/pause
function toggleMusic(){
  if(music.paused){
    music.play();
    playBtn.textContent = "⏸️";
  } else {
    music.pause();
    playBtn.textContent = "▶️";
  }
          }

function seek(e){
  const rect = progressContainer.getBoundingClientRect();
  let x = e.clientX - rect.left;

  x = Math.max(0, Math.min(x, rect.width));

  const percent = x / rect.width;

  music.currentTime = percent * music.duration;
  progress.style.width = (percent * 100) + "%";
                                                        }
  
</script>
</body>
</html>
